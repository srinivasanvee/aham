name: Deploy to Play Store

# Trigger: pushing a version tag from the terminal.
#
# Usage:
#   git tag v1.2.0
#   git push origin v1.2.0
#
# Tag format: v<major>.<minor>.<patch>  (e.g. v1.0.0, v1.2.3)
# The tag name becomes VERSION_NAME; GITHUB_RUN_NUMBER becomes VERSION_CODE.
on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Build & Deploy (release)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      # bundler-cache caches installed gems between runs using Gemfile.lock as the key.
      - name: Set up Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      # ── Parse version from tag ───────────────────────────────────────────────
      # GITHUB_REF looks like "refs/tags/v1.2.3".
      # Strip the "refs/tags/v" prefix to get "1.2.3" as VERSION_NAME.
      - name: Extract version from tag
        run: echo "VERSION_NAME=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"

      # ── Secrets decoding ────────────────────────────────────────────────────
      # Secrets are stored as base64 strings in GitHub (Settings → Secrets).
      # Encode your files locally:
      #   base64 -i your.keystore | pbcopy       → KEYSTORE_BASE64
      #   base64 -i play-store-key.json | pbcopy → PLAY_STORE_JSON_KEY_BASE64

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/keystore.jks"

      - name: Decode Play Store service-account key
        run: echo "${{ secrets.PLAY_STORE_JSON_KEY_BASE64 }}" | base64 -d > "$RUNNER_TEMP/play-store-key.json"

      # ── Build & upload ───────────────────────────────────────────────────────
      # VERSION_NAME = tag (e.g. "1.2.3"), set by the extract step above.
      # VERSION_CODE = GITHUB_RUN_NUMBER — always-incrementing integer; Play Store
      #                requires it to be strictly greater than the previous upload.
      - name: Run Fastlane deploy lane
        env:
          KEYSTORE_PATH:            ${{ runner.temp }}/keystore.jks
          KEYSTORE_PASSWORD:        ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:                ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:             ${{ secrets.KEY_PASSWORD }}
          PLAY_STORE_JSON_KEY_PATH: ${{ runner.temp }}/play-store-key.json
          VERSION_CODE:             ${{ github.run_number }}
          # VERSION_NAME is already in $GITHUB_ENV from the extract step
        run: bundle exec fastlane deploy

      # ── Artifacts ───────────────────────────────────────────────────────────
      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ env.VERSION_NAME }}
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
